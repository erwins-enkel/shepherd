name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

# Cancel in-progress runs for the same PR / branch when a new commit lands.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: verify
    # ── KEEP IN SYNC WITH .husky/pre-push (scripts/pre-push.ts) ──────────────────
    # The local pre-push hook no longer shares this job's shell body — it runs the
    # same gate set in parallel lanes via scripts/pre-push.ts. When you add/remove/
    # reorder a step here, mirror it there (and vice-versa). Deliberate differences:
    # the hook scopes prettier/eslint to the push delta and pins fallow to 2.100.0;
    # CI keeps the whole-repo checks. Keep the fallow version in sync across both.
    # Don't run the full suite on release-please's generated PR: it only bumps the
    # version + CHANGELOG, so verify is wasted minutes. That PR DOES trigger this
    # workflow (event=pull_request, actor=github-actions[bot]) — see release-please.yml.
    # head_ref is empty on push-to-main, so main still runs. NB: this only skips the
    # JOB once the run starts; GitHub's separate "awaiting approval" gate on bot PRs
    # is a repo Actions setting, not something a workflow file can control.
    if: ${{ !startsWith(github.head_ref, 'release-please--') }}
    # Runner toggle for the closed-source phase: set the repo variable CI_RUNNER to
    # 'self-hosted' to run on the local self-hosted runner (saves included minutes).
    # Unset/empty falls back to ubuntu-latest. MUST be deleted before the repo goes
    # public — a self-hosted runner on a public repo runs fork-PR code on the host.
    runs-on: ${{ vars.CI_RUNNER || 'ubuntu-latest' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          # Fallow's PR audit diffs against the base branch — needs full history.
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # Three packages, each with its own lockfile (root server + ui/ + extension/).
      # Each install goes through the shared retry-with-store-purge composite action
      # (.github/actions/bun-install-retry) so a one-off native-tarball-extraction flake
      # self-heals instead of redding the whole job (#1134, extending docs-site's #944).
      - name: Install (root)
        uses: ./.github/actions/bun-install-retry

      - name: Install (ui)
        uses: ./.github/actions/bun-install-retry
        with:
          working-directory: ui

      - name: Install (extension)
        uses: ./.github/actions/bun-install-retry
        with:
          working-directory: extension

      - name: Lint (prettier + eslint)
        run: |
          bunx prettier --check .
          bun run lint
          (cd extension && bun run lint)

      - name: Typecheck (root tsc)
        run: bun run typecheck

      - name: Typecheck (ui svelte-check)
        run: cd ui && bun run check

      - name: Typecheck (extension svelte-check)
        run: cd extension && bun run check

      - name: i18n catalog parity (en ↔ de)
        run: |
          (cd ui && bun run check:i18n)
          (cd extension && bun run check:i18n)

      - name: Test (root)
        # server.test.ts creates its temp repo inside repoRoot (default
        # $HOME/Work, absent on the runner). Point it at a writable temp dir.
        # The GIT_* identity vars let tests that author real commits (e.g.
        # createProject's bootstrap commit) run on a runner without a global
        # git config; they must be set here because Bun does not propagate
        # in-process env mutations to child processes.
        env:
          SHEPHERD_REPO_ROOT: ${{ runner.temp }}/reporoot
          GIT_AUTHOR_NAME: t
          GIT_AUTHOR_EMAIL: t@t
          GIT_COMMITTER_NAME: t
          GIT_COMMITTER_EMAIL: t@t
        run: |
          mkdir -p "$SHEPHERD_REPO_ROOT"
          bun test ./test

      - name: Install Playwright Chromium (ui browser tests)
        run: cd ui && bunx playwright install --with-deps chromium

      - name: Test (ui)
        run: cd ui && bun run test

      - name: Test (extension)
        run: cd extension && bun run test

      - name: Build (ui)
        run: cd ui && bun run build

      - name: Build (extension)
        run: cd extension && bun run build

      - name: Fallow audit (PR delta)
        # Only new findings introduced by the PR block — inherited issues don't.
        # Skip on direct pushes to main: there's no base branch to diff against.
        # Version pinned (not @latest) so analyzer changes are adopted deliberately,
        # not on a random CI run. The synthetic Svelte <template> complexity metric
        # (fallow 2.98+) is adopted via health.thresholdOverrides in .fallowrc.jsonc
        # (#851) — a Svelte-appropriate bar so new components aren't churned against the
        # library-default 20/15. The #756 line-shift mis-attribution that forced the old
        # 2.97 pin was re-tested against 2.100 and does NOT reproduce (inherited template
        # findings now attribute correctly across line shifts). Keep this version in sync
        # with .husky/pre-push and CONTRIBUTING.md.
        if: github.event_name == 'pull_request'
        run: bunx fallow@2.100.0 audit --base origin/${{ github.base_ref }} --fail-on-issues

  # The Astro Starlight docs site (docs-site/) is a 4th in-monorepo package with
  # its own lockfile. It builds self-contained — TypeDoc reads ../src via a
  # dedicated typedoc.tsconfig.json (own @types/bun, skipErrorChecking, disableGit)
  # and sync-docs.mjs reads checked-in files — so it needs only a plain checkout +
  # its own install, NOT the root/ui/extension installs. It lives in its OWN job
  # (not a step in `verify`) so a flaky pagefind install can't red the whole suite:
  # `pagefind` (the search indexer) ships its native binary as optional, platform-
  # specific deps (@pagefind/linux-x64, …) whose npm-tarball extraction during
  # `bun install` occasionally flakes (#944). NB: this workflow triggers only on
  # `branches: [main]`, so this job is dormant on docs-epic PRs (which target the
  # epic branch) and first runs when an epic merges to main.
  docs-site:
    name: docs-site
    # Skip release-please's generated PR (version/CHANGELOG bump only), mirroring
    # the `verify` job's guard. head_ref is empty on push-to-main, so main runs.
    if: ${{ !startsWith(github.head_ref, 'release-please--') }}
    # Same self-hosted runner toggle as `verify`: set repo var CI_RUNNER to
    # 'self-hosted' to use the local runner; unset falls back to ubuntu-latest.
    # MUST be deleted before the repo goes public.
    runs-on: ${{ vars.CI_RUNNER || 'ubuntu-latest' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # Cache bun's global store so the pagefind tarball isn't re-DOWNLOADED every
      # run (speed + download-flake mitigation). This does NOT reduce extraction
      # events — extraction into node_modules happens every run regardless — so the
      # retry below, not this cache, is what absorbs the tarball-extraction flake.
      - name: Cache bun store (docs-site)
        uses: actions/cache@v6
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-docs-site-${{ hashFiles('docs-site/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-docs-site-

      # Install via the shared retry-with-store-purge composite action
      # (.github/actions/bun-install-retry) so a one-off @pagefind tarball-extraction
      # flake (#944) self-heals: it purges the bun store before the final attempt so a
      # poisoned half-written tarball is re-downloaded fresh. Only the install is
      # retried — re-running check/build on a genuine type/content error would burn 3×
      # the time. The cache step above still precedes (and is purged by) this install.
      - name: Install (docs-site)
        uses: ./.github/actions/bun-install-retry
        with:
          working-directory: docs-site

      - name: Build (docs-site)
        working-directory: docs-site
        run: |
          bun run check
          bun run build
