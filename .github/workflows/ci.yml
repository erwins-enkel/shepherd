name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

# Cancel in-progress runs for the same PR / branch when a new commit lands.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: verify
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          # Fallow's PR audit diffs against the base branch — needs full history.
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # Two packages, each with its own lockfile (root server + ui/).
      - name: Install (root)
        run: bun install --frozen-lockfile

      - name: Install (ui)
        run: cd ui && bun install --frozen-lockfile

      - name: Lint (prettier + eslint)
        run: |
          bunx prettier --check .
          bun run lint

      - name: Typecheck (root tsc)
        run: bun run typecheck

      - name: Typecheck (ui svelte-check)
        run: cd ui && bun run check

      - name: i18n catalog parity (en ↔ de)
        run: cd ui && bun run check:i18n

      - name: Test (root)
        # server.test.ts creates its temp repo inside repoRoot (default
        # $HOME/Work, absent on the runner). Point it at a writable temp dir.
        env:
          SHEPHERD_REPO_ROOT: ${{ runner.temp }}/reporoot
        run: |
          mkdir -p "$SHEPHERD_REPO_ROOT"
          bun test ./test

      - name: Test (ui)
        run: cd ui && bun run test

      - name: Build (ui)
        run: cd ui && bun run build

      - name: Fallow audit (PR delta)
        # Only new findings introduced by the PR block — inherited issues don't.
        # Skip on direct pushes to main: there's no base branch to diff against.
        if: github.event_name == 'pull_request'
        run: bunx fallow audit --base origin/${{ github.base_ref }} --fail-on-issues
