name: Bug report
description: Report something that isn't working
labels: [bug]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Auto-filled by Shepherd — please leave as-is.
      render: text
