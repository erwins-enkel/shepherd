name: Feedback
description: Share general feedback
labels: [feedback]
body:
  - type: textarea
    id: feedback
    attributes:
      label: Your feedback
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: >-
        Auto-filled when you report from within Shepherd. If you're filing manually, paste your
        Shepherd version, your OS, and how you run Shepherd (e.g. the agent CLI you drive).
      render: text
