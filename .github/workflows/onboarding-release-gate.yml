name: Onboarding release gate

# Block a release while the onboarding harness is red.
#
# The harness needs Incus (a self-hosted host), so it CANNOT run in CI — it runs
# nightly on the Incus host and keeps one rolling `onboarding-regression` issue
# open whenever a scenario regresses (closing it when green again). This gate
# consults that issue when release-please's release PR is opened/updated, so a
# release can't ship over a known onboarding regression. It only READS an issue —
# no Incus, no host access — so it is safe and runs on a hosted runner.
on:
  pull_request:
    branches: [main]
  # Manually runnable so the gate can be exercised on demand. It otherwise fires
  # only on release-please PRs, whose bot-authored CI runs are approval-parked —
  # which made this gate effectively untestable until now.
  workflow_dispatch:

# Governs the GITHUB_TOKEN fallback only; the gate normally runs under the App
# token minted below (which carries its own grant). statuses:read covers the
# section-2 commit-status read.
permissions:
  issues: read
  contents: read
  statuses: read

jobs:
  onboarding-release-gate:
    # Gate the release-please PR; also allow manual dispatch for on-demand testing.
    # Every other PR is unaffected.
    if: ${{ github.event_name == 'workflow_dispatch' || startsWith(github.head_ref, 'release-please--') }}
    runs-on: ubuntu-latest
    steps:
      # The Actions GITHUB_TOKEN cannot read this repo's issues even with
      # `issues: read` granted — every call 403s "Resource not accessible by
      # integration" (an org-level constraint on the built-in token). So mint a
      # scoped, read-only token from the release-please GitHub App (same App as
      # release-please.yml). REQUIRED App installation grants: issues read (§1),
      # contents read + commit-statuses read (§2). The App was extended with
      # Commit statuses: read for this gate — if that grant is ever revoked the
      # token mint below errors and the step fails, which fails the gate CLOSED
      # (release blocked), never a false green. If the App is unconfigured we
      # fall back to GITHUB_TOKEN, which also fails closed — both safe for a gate.
      - name: Mint a scoped, read-only GitHub App token (when the App is configured)
        id: app-token
        if: ${{ vars.RELEASE_PLEASE_APP_CLIENT_ID != '' }}
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ vars.RELEASE_PLEASE_APP_CLIENT_ID }}
          private-key: ${{ secrets.RELEASE_PLEASE_APP_PRIVATE_KEY }}
          # Down-scope to exactly what the gate reads — not the App's full grant.
          permission-issues: read
          permission-contents: read
          permission-statuses: read

      - name: Require the onboarding harness to be fresh-green
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token || github.token }}
          REPO: ${{ github.repository }}
          # Max age of the latest nightly verdict before it's "stale" (nightly is
          # daily, so this allows one missed run of slack).
          MAX_AGE_SECONDS: "172800" # 48h
        run: |
          set -euo pipefail

          # Two signals from the nightly host run cover two distinct failure modes;
          # either one blocks the release (fail closed):
          #
          #   1. an open `onboarding-regression` issue  → an ACTIVE regression
          #      (also catches a red run whose status-publish failed but whose
          #       issue still opened).
          #   2. the latest `onboarding-harness` commit status is not a FRESH
          #      success → the harness isn't verified-green recently, e.g. the
          #      Incus host has been DOWN (no run at all leaves no fresh status).
          #
          # The status is the load-bearing freshness/liveness signal; the issue is
          # the human-facing active-regression signal.

          # (1) Active regression?
          # Read the rolling `onboarding-regression` issue via the REST issues
          # endpoint (`gh api`). This runs under the App token (see above); the
          # built-in GITHUB_TOKEN 403s on issues regardless of REST vs gh's
          # GraphQL `issue list`. `select(.pull_request|not)` drops any PR that
          # shares the label (the REST issues endpoint returns PRs too).
          open=$(gh api "repos/$REPO/issues?labels=onboarding-regression&state=open&per_page=100" \
            --jq '[.[] | select(.pull_request|not)]')
          if [ "$(printf '%s' "$open" | jq 'length')" -gt 0 ]; then
            url=$(printf '%s' "$open" | jq -r '.[0].html_url')
            echo "::error::Onboarding harness is RED (open regression issue) — resolve before releasing: $url"
            exit 1
          fi

          # (2) Fresh green status? The nightly stamps an `onboarding-harness` status
          # on the main SHA it tested; main moves on (this repo lands dozens of
          # commits/day), so walk commits NEWEST-FIRST within a generous time window
          # — `since` + `--paginate`, so a busy day can't truncate the search the way
          # a fixed commit count would — and take the first status found. Then require
          # success + age < MAX_AGE_SECONDS. Missing or stale ⇒ fail closed (we can't
          # confirm a recent green run, e.g. the Incus host is down).
          since=$(date -u -d '96 hours ago' +%Y-%m-%dT%H:%M:%SZ)
          latest=""
          for sha in $(gh api --paginate "repos/$REPO/commits?sha=main&since=$since&per_page=100" --jq '.[].sha'); do
            latest=$(gh api "repos/$REPO/commits/$sha/statuses" \
              --jq '[.[] | select(.context=="onboarding-harness")] | sort_by(.created_at) | last // empty')
            [ -n "$latest" ] && break
          done
          if [ -z "$latest" ]; then
            echo "::error::No onboarding-harness status on recent main commits — has the nightly run? Refusing to release unverified."
            exit 1
          fi

          state=$(printf '%s' "$latest" | jq -r .state)
          created=$(printf '%s' "$latest" | jq -r .created_at)
          age=$(( $(date -u +%s) - $(date -u -d "$created" +%s) ))
          echo "latest onboarding-harness status: $state at $created (age ${age}s)"
          if [ "$state" != "success" ]; then
            echo "::error::Latest onboarding-harness status is '$state' — the harness is not green."
            exit 1
          fi
          if [ "$age" -gt "$MAX_AGE_SECONDS" ]; then
            echo "::error::Latest onboarding-harness status is stale (> ${MAX_AGE_SECONDS}s) — the nightly may not be running. Refusing to release on a stale signal."
            exit 1
          fi
          echo "Onboarding harness is fresh-green — release may proceed."
