<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <title>Shepherd — run a herd of real Claude Code agents</title>
  <defs>
    <linearGradient id="ag" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#e8a13a"/>
      <stop offset="1" stop-color="#5ad19a"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.85" cy="0.1" r="0.6">
      <stop offset="0" stop-color="#e8a13a" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#e8a13a" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- backdrop -->
  <rect width="1200" height="630" fill="#0a0d0c"/>
  <rect width="1200" height="630" fill="url(#glow)"/>
  <rect x="20" y="20" width="1160" height="590" rx="22" fill="none" stroke="#1b2422" stroke-width="2"/>

  <!-- brand mark (reused sheep) + wordmark -->
  <g transform="translate(80,64) scale(1.05)">
    <rect x="1.5" y="1.5" width="61" height="61" rx="14" fill="#0f1413" stroke="#2c3835" stroke-width="1.5"/>
    <g fill="#e9f1ec">
      <circle cx="22" cy="24" r="9"/>
      <circle cx="32" cy="19" r="10"/>
      <circle cx="43" cy="24" r="9"/>
      <circle cx="20" cy="34" r="9"/>
      <circle cx="32" cy="36" r="11"/>
      <circle cx="44" cy="34" r="9"/>
    </g>
    <ellipse cx="20" cy="38" rx="4" ry="6" fill="#0a0d0c" transform="rotate(-22 20 38)"/>
    <ellipse cx="44" cy="38" rx="4" ry="6" fill="#0a0d0c" transform="rotate(22 44 38)"/>
    <ellipse cx="32" cy="41" rx="11" ry="12" fill="#0a0d0c"/>
    <circle cx="27.5" cy="39" r="2.1" fill="#e8a13a"/>
    <circle cx="36.5" cy="39" r="2.1" fill="#e8a13a"/>
    <ellipse cx="32" cy="47.5" rx="3.4" ry="2.6" fill="#5d6c67"/>
  </g>
  <text x="162" y="112" font-family="Helvetica, Arial, sans-serif" font-size="40" font-weight="700" fill="#e9f1ec" letter-spacing="-0.5">shepherd</text>

  <!-- headline -->
  <text x="80" y="290" font-family="Helvetica, Arial, sans-serif" font-size="76" font-weight="700" fill="#e9f1ec" letter-spacing="-1.5">Run a herd of real</text>
  <text x="80" y="378" font-family="Helvetica, Arial, sans-serif" font-size="76" font-weight="700" fill="#e9f1ec" letter-spacing="-1.5">Claude Code agents</text>

  <!-- gradient tagline -->
  <text x="80" y="452" font-family="Helvetica, Arial, sans-serif" font-size="42" font-weight="700" fill="url(#ag)" letter-spacing="-0.5">ship only what survives review.</text>

  <!-- install command -->
  <rect x="80" y="512" width="640" height="58" rx="10" fill="#0f1413" stroke="#1b2422" stroke-width="1.5"/>
  <text x="104" y="549" font-family="monospace" font-size="25" fill="#7d8c87"><tspan fill="#5ad19a">$</tspan> curl -fsSL shepherd.run/install.sh | bash</text>

  <!-- accent corner pips -->
  <g transform="translate(1010,300)">
    <circle cx="0" cy="0" r="7" fill="#e8a13a"/>
    <circle cx="0" cy="34" r="7" fill="#5ad19a"/>
    <circle cx="0" cy="68" r="7" fill="#4a90d9"/>
    <circle cx="0" cy="102" r="7" fill="#566460"/>
  </g>
</svg>
